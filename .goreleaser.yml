archives:
  - id: archive
    name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
before:
  hooks:
    - make tfgen
builds:
  - binary: pulumi-resource-volcengine
    dir: provider
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - windows
      - linux
    # 限制并行构建数量，减少内存使用
    gobuildflags:
      - -p=1
    ldflags:
      - -X github.com/volcengine/pulumi-volcengine/provider/pkg/version.Version={{.Tag}}
    main: ./cmd/pulumi-resource-volcengine/
changelog:
  skip: true
release:
  disable: false
  prerelease: auto
snapshot:
  name_template: '{{ .Tag }}-SNAPSHOT'